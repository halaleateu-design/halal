services:
  - type: web
    name: go-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22.10.0"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: CORS_ORIGIN
        value: https://fanciful-moxie-6b5bba.netlify.app
      - key: FRONTEND_URL
        value: https://fanciful-moxie-6b5bba.netlify.app
      - key: API_PUBLIC_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: DATABASE_PATH
        value: ./data/go.db
      - key: UPLOAD_DIR
        value: ./data/uploads
