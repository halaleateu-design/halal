# GO static site — Netlify deploy
[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "/riders"
  to = "/riders.html"
  status = 301

[[redirects]]
  from = "/rider"
  to = "/rider/"
  status = 301


[[redirects]]
  from = "/api/*"
  to = "https://halall-dm79.onrender.com/api/:splat"
  status = 200
  force = true
