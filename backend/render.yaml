services:
  - type: web
    name: tayy-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.10.0
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: STATIC_ROOT
        value: ..
      - key: CORS_ORIGIN
        value: https://fanciful-moxie-6b5bba.netlify.app
